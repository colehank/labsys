<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CIBOL · 实验室系统</title>
<link rel="icon" href="/assets/logo-icon.svg" />
<style>
  html, body { margin: 0; height: 100%; }
  #__boot { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: var(--canvas, #232220); font-family: var(--font-sans, system-ui, sans-serif); }
  #__boot .ring { width: 30px; height: 30px; border-radius: 50%; border: 3px solid color-mix(in oklch, var(--accent, #BD5D3A) 22%, transparent); border-top-color: var(--accent, #BD5D3A); animation: __spin .8s linear infinite; }
  #__boot .lbl { font-size: 13.5px; color: var(--text-faint, #9a948a); letter-spacing: .04em; }
  @keyframes __spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"><div id="__boot"><div class="ring"></div><div class="lbl">正在加载…</div></div></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
