# Labsys Workflow Add Frontend Screen Or Tab

## Action

Follow the add-frontend-screen-or-tab workflow:
1. Create or update screen component in frontend/src/screens/
2. Update API hooks in frontend/src/api/hooks.ts
3. Update or regenerate API schema in frontend/src/api/schema.ts and openapi.json
4. Wire up navigation or tabs in existing screens

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: frontend/src/screens/*.tsx, frontend/src/api/hooks.ts, frontend/src/api/schema.ts

