# Labsys Workflow Add Backend Feature With Model And Api

## Action

Follow the add-backend-feature-with-model-and-api workflow:
1. Create new model file in backend/app/models/
2. Update backend/app/models/__init__.py to include the new model
3. Create Alembic migration script in backend/alembic/versions/
4. Implement service logic in backend/app/domains/<feature>/service.py
5. Implement API router in backend/app/domains/<feature>/router.py
6. Update backend/app/main.py to include the new router

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: backend/alembic/versions/*.py, backend/app/models/*.py, backend/app/models/__init__.py

